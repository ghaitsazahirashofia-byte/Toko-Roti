<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdfbf7; font-family: sans-serif; }
        .checkout-card { max-width: 600px; margin: 50px auto; background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-label { font-weight: bold; color: #4a2c11; }
        .btn-checkout { background-color: #4a2c11; color: white; border: none; padding: 10px; font-weight: bold; width: 100%; border-radius: 5px; }
        .btn-checkout:hover { background-color: #361f0c; }
    </style>
</head>
<body>

    <header class="p-3 text-center" style="background-color: #4a2c11; color: white;">
        <h3>Toko Roti</h3>
    </header>

    <div class="checkout-card">
        <h2 class="text-center fw-bold" style="color: #4a2c11; margin-bottom: 5px;">Selesaikan Pesanan Anda</h2>
        <p class="text-center text-muted mb-4">Isi form di bawah ini dan kami akan memproses pesanan Anda.</p>

        <form id="formCheckout">
            <div class="mb-3">
                <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                <input type="text" id="namaLengkap" class="form-control" placeholder="Masukkan nama Anda">
            </div>

            <div class="mb-3">
                <label for="nomorWa" class="form-label">Nomor WhatsApp Aktif</label>
                <input type="text" id="nomorWa" class="form-control" placeholder="Contoh: 08123456789">
            </div>

            <div class="mb-3">
                <label for="alamatKirim" class="form-label">Alamat Pengiriman Lengkap</label>
                <textarea id="alamatKirim" class="form-control" rows="3" placeholder="Jalan, RT/RW, Kecamatan..."></textarea>
            </div>

            <div class="mb-3">
                <label for="daftarPesanan" class="form-label">Pesan / Daftar Pesanan Anda</label>
                <textarea id="daftarPesanan" class="form-control" rows="6" placeholder="Memuat daftar pesanan..." readonly></textarea>
            </div>

            <button type="button" class="btn-checkout mt-2" onclick="kirimKeWhatsApp()">
                Selesaikan Pesanan via WhatsApp
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
